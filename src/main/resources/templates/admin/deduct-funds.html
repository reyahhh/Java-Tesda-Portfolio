<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${pageTitle} + ' | GBank'">Deduct Funds | GBank</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body class="min-h-screen bg-gray-50 font-sans text-gray-900 dark:bg-gray-900 dark:text-gray-100">
<div th:replace="~{layout/base :: navbar}"></div>
<div class="flex min-h-screen pt-20">
  <aside th:replace="~{layout/base :: sidebar}"></aside>
  <main class="min-w-0 flex-1 p-6 flex items-start justify-center">
    <div class="w-full max-w-xl rounded-2xl border border-gray-100 bg-white p-8 shadow-sm dark:border-gray-700 dark:bg-gray-800">
      <div class="mb-6">
        <h2 class="text-2xl font-bold">Deduct Funds</h2>
        <p class="mt-1 text-sm text-gray-500 dark:text-gray-400" th:text="'For ' + ${user.fullName}">For user</p>
      </div>

      <div th:if="${success}" class="mb-6 rounded-lg border border-green-300 bg-green-50 p-3 text-sm text-green-800">
        ✅ <span th:text="${success}"></span>
      </div>

      <form th:action="@{'/admin/users/' + ${user.id} + '/deduct-funds'}"
            method="post"
            th:object="${deductFundsRequest}"
            class="flex flex-col gap-5">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div>
          <label class="mb-1 block text-sm font-medium">Amount (₱)</label>
          <input type="number" step="0.01" th:field="*{amount}" class="form-input" placeholder="0.00"/>
          <p th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}" class="form-error"></p>
        </div>

        <div>
          <label class="mb-1 block text-sm font-medium">Reason</label>
          <input type="text" th:field="*{reason}" class="form-input" placeholder="e.g. Refund, Adjustment"/>
          <p th:if="${#fields.hasErrors('reason')}" th:errors="*{reason}" class="form-error"></p>
        </div>

        <div class="mt-2 flex gap-3">
          <button type="submit" class="btn-primary flex-1">Deduct Funds</button>
          <a th:href="@{'/admin/users/' + ${user.id}}" class="btn-secondary flex-1 text-center">Cancel</a>
        </div>
      </form>
    </div>
  </main>
</div>
<script th:src="@{/js/theme.js}"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
