<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pageTitle} + ' | GBank'">Profile | GBank</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
          rel="stylesheet"/>
</head>
<body class="bg-gray-50 font-sans">
<div th:replace="~{layout/base :: navbar}"></div>
<div class="flex min-h-screen">
    <div th:replace="~{layout/base :: sidebar}"></div>
    <main class="flex-1 p-8">

        <h2 class="text-2xl font-bold text-gcash-dark mb-6">👤 My Profile</h2>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 max-w-lg">

            <!-- Avatar placeholder -->
            <div class="flex items-center gap-5 mb-8">
                <div class="w-20 h-20 rounded-full bg-gcash-blue flex items-center justify-center text-white text-3xl font-bold"
                     th:text="${user.fullName.substring(0,1).toUpperCase()}">J</div>
                <div>
                    <h3 class="text-xl font-bold text-gcash-dark" th:text="${user.fullName}">Juan</h3>
                    <p class="text-gray-500 text-sm" th:text="${user.role.name().replace('ROLE_','')}">USER</p>
                    <span class="text-xs px-2 py-0.5 rounded-full mt-1 inline-block"
                          th:classappend="${user.enabled} ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'"
                          th:text="${user.enabled} ? 'Active' : 'Disabled'">Active</span>
                </div>
            </div>

            <!-- Info rows -->
            <dl class="grid grid-cols-1 gap-4 text-sm">
                <div class="flex justify-between border-b pb-3">
                    <dt class="text-gray-500 font-medium">Mobile Number</dt>
                    <dd class="text-gray-800 font-semibold" th:text="${user.mobileNumber}">09XXX</dd>
                </div>
                <div class="flex justify-between border-b pb-3">
                    <dt class="text-gray-500 font-medium">Email Address</dt>
                    <dd class="text-gray-800" th:text="${user.email}">—</dd>
                </div>
                <div class="flex justify-between border-b pb-3">
                    <dt class="text-gray-500 font-medium">Wallet Balance</dt>
                    <dd class="text-gcash-blue font-bold text-lg"
                        th:text="'₱' + ${#numbers.formatDecimal(user.balance, 1, 2)}">₱0.00</dd>
                </div>
                <div class="flex justify-between">
                    <dt class="text-gray-500 font-medium">Member Since</dt>
                    <dd class="text-gray-800"
                        th:text="${#temporals.format(user.createdAt, 'MMMM dd, yyyy')}">—</dd>
                </div>
            </dl>
        </div>
    </main>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
