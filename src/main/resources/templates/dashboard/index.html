<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pageTitle} + ' | GBank'">Dashboard | GBank</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
          rel="stylesheet"/>
</head>
<body class="bg-gray-50 font-sans">

<div th:replace="~{layout/base :: navbar}"></div>

<div class="flex min-h-screen">
    <div th:replace="~{layout/base :: sidebar}"></div>

    <main class="flex-1 p-8">

        <!-- Flash messages -->
        <div th:if="${success}"
             class="bg-green-50 border border-green-300 text-green-800 rounded-lg p-3 mb-6 text-sm">
            ✅ <span th:text="${success}"></span>
        </div>

        <!-- Welcome heading -->
        <h2 class="text-2xl font-bold text-gcash-dark mb-6"
            th:text="'Welcome back, ' + ${user.fullName} + '! 👋'">Welcome back!</h2>

        <!-- Wallet Card -->
        <div class="wallet-card mb-8 max-w-sm">
            <p class="text-sm opacity-80 mb-1">GCash Wallet Balance</p>
            <p class="text-4xl font-bold"
               th:text="'₱' + ${#numbers.formatDecimal(user.balance, 1, 2)}">₱0.00</p>
            <p class="text-xs opacity-70 mt-2"
               th:text="'Mobile: ' + ${user.mobileNumber}">09XXXXXXXXX</p>
        </div>

        <!-- Quick Actions -->
        <h3 class="text-lg font-semibold text-gray-700 mb-3">Quick Actions</h3>
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-10">
            <a th:href="@{/transactions/send}" class="quick-action">
                <span class="text-2xl">💸</span>
                <span class="text-sm font-medium text-gray-700">Send Money</span>
            </a>
            <a th:href="@{/bills}" class="quick-action">
                <span class="text-2xl">🧾</span>
                <span class="text-sm font-medium text-gray-700">Pay Bills</span>
            </a>
            <a th:href="@{/load}" class="quick-action">
                <span class="text-2xl">📱</span>
                <span class="text-sm font-medium text-gray-700">Buy Load</span>
            </a>
            <a th:href="@{/transactions}" class="quick-action">
                <span class="text-2xl">📋</span>
                <span class="text-sm font-medium text-gray-700">History</span>
            </a>
        </div>

        <!-- Recent Transactions -->
        <h3 class="text-lg font-semibold text-gray-700 mb-3">Recent Transactions</h3>
        <div class="bg-white rounded-xl shadow-sm overflow-hidden border border-gray-100">
            <div th:if="${#lists.isEmpty(recentTransactions)}"
                 class="p-6 text-center text-gray-400 text-sm">
                No transactions yet. Start by sending money!
            </div>
            <table th:unless="${#lists.isEmpty(recentTransactions)}"
                   class="w-full text-sm">
                <thead class="bg-gray-50 text-gray-500 text-left">
                <tr>
                    <th class="px-4 py-3 font-medium">Type</th>
                    <th class="px-4 py-3 font-medium">Details</th>
                    <th class="px-4 py-3 font-medium text-right">Amount</th>
                    <th class="px-4 py-3 font-medium">Date</th>
                </tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                <tr th:each="tx : ${recentTransactions}"
                    class="hover:bg-gray-50 transition-colors">
                    <td class="px-4 py-3">
                            <span th:switch="${tx.type.name()}">
                                <span th:case="'SEND'"         class="badge-send">Send</span>
                                <span th:case="'RECEIVE'"      class="badge-receive">Receive</span>
                                <span th:case="'BILL_PAYMENT'" class="badge-bill">Bill</span>
                                <span th:case="'LOAD_PURCHASE'" class="badge-load">Load</span>
                                <span th:case="'CASH_IN'"      class="badge-cashin">Cash In</span>
                            </span>
                    </td>
                    <td class="px-4 py-3 text-gray-600"
                        th:text="${tx.description ?: tx.referenceNumber}">—</td>
                    <td class="px-4 py-3 text-right font-semibold"
                        th:classappend="${tx.sender != null and tx.sender.id == user.id}
                                           ? 'text-red-500' : 'text-green-600'"
                        th:text="'₱' + ${#numbers.formatDecimal(tx.amount, 1, 2)}">₱0.00</td>
                    <td class="px-4 py-3 text-gray-400 text-xs"
                        th:text="${#temporals.format(tx.createdAt, 'MMM dd, yyyy')}">—</td>
                </tr>
                </tbody>
            </table>
        </div>

        <a th:href="@{/transactions}" class="inline-block mt-4 text-sm text-gcash-blue hover:underline">
            View all transactions →
        </a>
    </main>
</div>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
