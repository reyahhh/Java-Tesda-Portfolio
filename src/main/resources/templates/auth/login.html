<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pageTitle} + ' | GBank'">Login | GBank</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
          rel="stylesheet"/>
</head>
<body class="min-h-screen flex items-center justify-center font-sans bg-gradient-to-br from-gray-50 to-gray-100 dark:from-gray-900 dark:to-gray-800 transition-colors duration-300">

<!-- Main Container -->
<div class="w-full max-w-sm mx-auto px-4">
    <div class="rounded-2xl bg-white dark:bg-gray-800 p-8 shadow-xl dark:shadow-2xl transition-colors duration-300 border border-gray-100 dark:border-gray-700">

        <!-- Logo / Header -->
        <div class="text-center mb-8">
            <div class="text-6xl mb-3 inline-block">💙</div>
            <h1 class="text-3xl font-bold text-gray-900 dark:text-white">GBank</h1>
            <p class="text-gray-600 dark:text-gray-300 text-sm mt-2">Secure access to your wallet</p>
        </div>

        <!-- Alert messages -->
        <div th:if="${error}"
             class="bg-red-50 dark:bg-red-900/20 border-l-4 border-red-500 text-red-700 dark:text-red-200 rounded-lg p-4 mb-4 text-sm">
            <div class="flex items-center gap-2">
                <span class="text-lg flex-shrink-0">⚠️</span>
                <span th:text="${error}"></span>
            </div>
        </div>
        <div th:if="${message}"
             class="bg-green-50 dark:bg-green-900/20 border-l-4 border-green-500 text-green-700 dark:text-green-200 rounded-lg p-4 mb-4 text-sm">
            <div class="flex items-center gap-2">
                <span class="text-lg flex-shrink-0">✅</span>
                <span th:text="${message}"></span>
            </div>
        </div>

        <!-- Login Form -->
        <form th:action="@{/auth/login}" method="post" class="space-y-5">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <!-- Mobile Number Field -->

            <div class="space-y-2">
                <label for="mobileNumber" class="block text-sm font-semibold text-gray-700 dark:text-gray-200">
                    Mobile Number
                </label>
                <div class="relative group">
                    <span class="absolute left-3 top-3 text-gray-400 dark:text-gray-500 group-focus-within:text-blue-500 transition-colors text-lg">
                        📱
                    </span>
                    <input 
                           id="mobileNumber"
                           type="text"
                           name="mobileNumber"
                           placeholder="09XXXXXXXXX"
                           class="w-full pl-10 pr-4 py-2.5 border-2 border-gray-200 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white placeholder-gray-400 dark:placeholder-gray-500 shadow-sm focus:outline-none focus:border-blue-500 dark:focus:border-blue-400 focus:ring-2 focus:ring-blue-500/20 dark:focus:ring-blue-400/20 transition-all"
                           maxlength="11"
                           inputmode="numeric"
                           pattern="[0-9]{11}"
                           required/>
                </div>
            </div>

            <!-- Password Field -->
            <div class="space-y-2">
                <label for="password" class="block text-sm font-semibold text-gray-700 dark:text-gray-200">
                    Password
                </label>
                <div class="relative group">
                    <span class="absolute left-3 top-3 text-gray-400 dark:text-gray-500 group-focus-within:text-blue-500 transition-colors text-lg">
                        🔒
                    </span>
                    <input 
                           id="password"
                           type="password"
                           name="password"
                           placeholder="Enter your password"
                           class="w-full pl-10 pr-4 py-2.5 border-2 border-gray-200 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white placeholder-gray-400 dark:placeholder-gray-500 shadow-sm focus:outline-none focus:border-blue-500 dark:focus:border-blue-400 focus:ring-2 focus:ring-blue-500/20 dark:focus:ring-blue-400/20 transition-all"
                           required/>
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit"
                    class="w-full px-4 py-3 bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800 dark:from-blue-500 dark:to-blue-600 dark:hover:from-blue-600 dark:hover:to-blue-700 text-white font-semibold rounded-lg shadow-lg hover:shadow-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 transition-all duration-200 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed disabled:active:scale-100">
                Sign In
            </button>
        </form>

        <!-- Divider -->
        <div class="mt-6 mb-6 flex items-center gap-3">
            <div class="flex-1 h-px bg-gray-200 dark:bg-gray-700"></div>
            <span class="text-xs text-gray-500 dark:text-gray-400 uppercase tracking-wider">New to GBank?</span>
            <div class="flex-1 h-px bg-gray-200 dark:bg-gray-700"></div>
        </div>

        <!-- Register Link -->
        <a th:href="@{/auth/register}"
           class="block w-full text-center px-4 py-2.5 border-2 border-gray-300 dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200 font-semibold rounded-lg transition-all duration-200 hover:border-blue-500 dark:hover:border-blue-400">
            Create an Account
        </a>

    </div>

    <!-- Footer Text -->
    <p class="text-center text-xs text-gray-500 dark:text-gray-400 mt-6 px-4">
        By signing in, you agree to our
        <a href="#" class="text-blue-600 dark:text-blue-400 hover:underline">Terms of Service</a>
        and
        <a href="#" class="text-blue-600 dark:text-blue-400 hover:underline">Privacy Policy</a>
    </p>
</div>

</body>
</html>
