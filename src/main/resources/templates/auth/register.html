<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pageTitle} + ' | GBank'">Register | GBank</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
          rel="stylesheet"/>
</head>
<body class="bg-gcash-soft min-h-screen flex items-center justify-center font-sans py-10">

<div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8">

    <div class="text-center mb-8">
        <div class="text-4xl mb-2">💙</div>
        <h1 class="text-2xl font-bold text-gcash-dark">Create Account</h1>
        <p class="text-gray-500 text-sm mt-1">Join GBank today</p>
    </div>

    <div th:if="${error}"
         class="bg-red-50 border border-red-300 text-red-700 rounded-lg p-3 mb-4 text-sm">
        <span th:text="${error}"></span>
    </div>

    <form th:action="@{/auth/register}" method="post"
          th:object="${registerRequest}" class="flex flex-col gap-4">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
            <input type="text" th:field="*{fullName}" placeholder="Juan dela Cruz"
                   class="form-input"/>
            <p th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"
               class="form-error"></p>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Mobile Number</label>
            <input type="text" th:field="*{mobileNumber}" placeholder="09XXXXXXXXX"
                   class="form-input" maxlength="11"/>
            <p th:if="${#fields.hasErrors('mobileNumber')}" th:errors="*{mobileNumber}"
               class="form-error"></p>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
            <input type="email" th:field="*{email}" placeholder="juan@example.com"
                   class="form-input"/>
            <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}"
               class="form-error"></p>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input type="password" th:field="*{password}" placeholder="Min 8 characters"
                   class="form-input"/>
            <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}"
               class="form-error"></p>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
            <input type="password" th:field="*{confirmPassword}"
                   placeholder="Re-enter password" class="form-input"/>
            <p th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"
               class="form-error"></p>
        </div>

        <button type="submit" class="btn-primary w-full mt-2 text-center">
            Create Account
        </button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-6">
        Already have an account?
        <a th:href="@{/auth/login}" class="text-gcash-blue font-medium hover:underline">
            Sign in here
        </a>
    </p>

</div>
</body>
</html>
